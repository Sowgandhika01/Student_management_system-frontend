<div class="card">

  <div class="header">
    <h2>{{ id ? 'Edit Student' : 'Add Student' }}</h2>

    <p-button 
      label="Back" 
      icon="pi pi-arrow-left"
      severity="secondary"
      (onClick)="router.navigate(['/'])">
    </p-button>
  </div>

  <div class="field">
    <label>Name</label>
    <input pInputText [(ngModel)]="student.name" />
  </div>

  <div class="field">
    <label>Email</label>
    <input pInputText [(ngModel)]="student.email" />
  </div>

  <h3>Marks</h3>

  <div *ngFor="let mark of student.marks; let i = index" class="mark-row">

    <input 
      pInputText 
      [(ngModel)]="mark.subject" 
      placeholder="Subject" 
      class="small-input">

    <input 
      pInputText 
      [(ngModel)]="mark.marks" 
      type="number" 
      placeholder="Score"
      class="small-input">

    <p-button 
      icon="pi pi-times" 
      severity="danger"
      (onClick)="removeMark(i)">
    </p-button>

  </div>

  <p-button 
    label="Add Mark" 
    icon="pi pi-plus" 
    severity="success"
    (onClick)="addMark()">
  </p-button>

  <h3>Courses</h3>

  <div class="courses">

    <div *ngFor="let course of courses" class="course-item">

      <span>
        {{ course.courseName || course.course_name || course.name }}
      </span>

      <p-button 
        *ngIf="!isCourseChecked(course.id)"
        label="Add"
        size="small"
        severity="success"
        (onClick)="addCourseToStudent(course)">
      </p-button>

      <p-button 
        *ngIf="isCourseChecked(course.id)"
        label="Remove"
        size="small"
        severity="danger"
        (onClick)="removeCourseFromStudent(course)">
      </p-button>

    </div>

  </div>

  <div class="add-course">
    <input 
      pInputText 
      [(ngModel)]="newCourseName" 
      placeholder="New course name">

    <p-button 
      label="Add Course" 
      severity="info"
      (onClick)="addCourseToDb()">
    </p-button>

  </div>
  
  <p-button 
    label="Save" 
    icon="pi pi-check" 
    severity="success"
    class="save-btn"
    (onClick)="save()">
  </p-button>

</div>
