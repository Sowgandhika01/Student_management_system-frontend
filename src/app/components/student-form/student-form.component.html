<div class="container">

  <div style="display:flex;justify-content:space-between;align-items:center;">
    <h2>{{ id ? 'Edit Student' : 'Add Student' }}</h2>
    <button class="btn-back" (click)="router.navigate(['/'])">Back to Home</button>
  </div>

  <!-- Name -->
  <label>Name:</label>
  <input [(ngModel)]="student.name" class="input" />

  <!-- Email -->
  <label>Email:</label>
  <input [(ngModel)]="student.email" class="input" />

  <!-- MARKS -->
  <h3>Marks</h3>

  <div *ngFor="let mark of student.marks; let i = index" class="mark-row">
    <input [(ngModel)]="mark.subject" placeholder="Subject" class="input small">
    <input [(ngModel)]="mark.marks" type="number" placeholder="Score" class="input small">

    <button class="btn-remove" (click)="removeMark(i)">✖</button>
  </div>

  <button class="btn-add" (click)="addMark()">+ Add Mark</button>

  <!-- COURSES -->
  <h3>Courses</h3>

  <div class="courses">
    <div *ngFor="let course of courses" class="course-item">
      <span>{{ course.courseName || course.course_name || course.name }}</span>
      <button class="btn-small" *ngIf="!isCourseChecked(course.id)" (click)="addCourseToStudent(course)">Add</button>
      <button class="btn-small" *ngIf="isCourseChecked(course.id)" (click)="removeCourseFromStudent(course)">Remove</button>
    </div>
  </div>

  <div style="margin-top:8px;">
    <input class="input small" placeholder="New course name" [(ngModel)]="newCourseName">
    <button class="btn-add" (click)="addCourseToDb()">Add Course</button>
  </div>

  <!-- SAVE BUTTON -->
  <button class="btn-save" (click)="save()">Save</button>

</div>
