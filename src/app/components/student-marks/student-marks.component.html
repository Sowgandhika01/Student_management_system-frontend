<div class="card">

  <h2 class="title">Student Marks</h2>

  <p-message 
    *ngIf="loadError" 
    severity="error" 
    text="Error loading marks: {{ loadError }}">
  </p-message>

  <div class="back-container">
    <p-button 
      label="Back" 
      icon="pi pi-arrow-left" 
      severity="secondary"
      (onClick)="router.navigate(['/'])">
    </p-button>
  </div>

  <p-message 
    *ngIf="!loadError && (student?.marks?.length ?? 0) === 0" 
    severity="info" 
    text="No marks available for this student.">
  </p-message>

  <p-table 
    *ngIf="student.marks.length" 
    [value]="student.marks"
    [tableStyle]="{ 'min-width': '10rem' }"
    stripedRows>

    <ng-template pTemplate="header">
      <tr>
        <th>Subject</th>
        <th>Marks</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-mark>
      <tr>
        <td>{{ mark.subject }}</td>
        <td>{{ mark.marks }}</td>
      </tr>
    </ng-template>

  </p-table>

</div>
